name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref. Saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node (sdk + inspector + apps tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install workspace
        run: npm install --no-audit --no-fund

      - name: build kriya-core
        run: npm run build --workspace kriya-core

      - name: test kriya-core
        run: npm run test --workspace kriya-core

      - name: build kriya-inspector
        run: npm run build --workspace kriya-inspector

      - name: typecheck note-app
        run: npx tsc --noEmit
        working-directory: apps/note-app

      - name: typecheck task-manager
        run: npx tsc --noEmit
        working-directory: apps/task-manager

  rust:
    name: rust (host crate tests + apps cargo check)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 system deps. Pulled from the Tauri 2 prerequisites page.
      - name: install tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Share the cache across both app crate roots. The host crate is a
          # library with no committed Cargo.lock (consumers own resolution); its
          # tests run via the note-app's lockfile, which has the alloc-no-stdlib
          # pin that dodges the brotli/alloc-stdlib trait split.
          workspaces: |
            apps/note-app/src-tauri
            apps/task-manager/src-tauri

      - name: test kriya (via note-app lockfile)
        working-directory: apps/note-app/src-tauri
        run: cargo test -p kriya --locked

      - name: test kriya MCP client + broker + remote HTTP transport
        working-directory: crates/kriya
        run: cargo test --features mcp-http

      - name: cargo check note-app backend
        working-directory: apps/note-app/src-tauri
        run: cargo check --locked

      - name: cargo check task-manager backend
        working-directory: apps/task-manager/src-tauri
        run: cargo check --locked

  scaffolder-smoke:
    name: scaffolder (generate + tsc the output)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [node]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install workspace
        run: npm install --no-audit --no-fund

      - name: build core (needed by scaffolded app's tsc)
        run: npm run build --workspace kriya-core

      - name: build inspector
        run: npm run build --workspace kriya-inspector

      - name: scaffold a sample app
        run: |
          cd "$RUNNER_TEMP"
          node "$GITHUB_WORKSPACE/packages/create-kriya-app/bin/index.mjs" ci-smoke

      - name: verify scaffolded files
        run: |
          cd "$RUNNER_TEMP/ci-smoke"
          test -f README.md
          test -f package.json
          test -f src-tauri/Cargo.toml
          test -f src/actions.ts
          # No unsubstituted placeholders. Match the exact tokens the scaffolder
          # replaces — `format!` macros legitimately contain `{{` as a literal
          # brace escape, so the test has to be specific.
          if grep -rE '\{\{(NAME|NAME_SNAKE|TITLE|IDENTIFIER)\}\}' .; then
            echo "ERROR: unsubstituted scaffolder placeholders found above" >&2
            exit 1
          fi

      - name: typecheck the scaffolded app against the in-repo workspace
        run: |
          # Move scaffolded app under apps/ so workspace resolves the kriya-* packages
          mv "$RUNNER_TEMP/ci-smoke" "$GITHUB_WORKSPACE/apps/ci-smoke"
          npm install --no-audit --no-fund
          cd "$GITHUB_WORKSPACE/apps/ci-smoke"
          npx tsc --noEmit
