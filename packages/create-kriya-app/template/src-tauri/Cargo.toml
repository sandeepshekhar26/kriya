[package]
name = "{{NAME}}"
version = "0.0.1"
description = "kriya desktop app scaffolded by create-kriya-app"
edition = "2021"
rust-version = "1.77"

[lib]
name = "{{NAME_SNAKE}}_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde_json = "1"
# The agent host (protocol, signed audit, budget, persistent memory, permissions,
# inference backends) lives in the published `kriya` crate — not vendored here.
kriya = "0.1"
