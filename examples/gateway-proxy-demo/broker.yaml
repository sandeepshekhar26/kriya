# kriya-gateway broker — ONE MCP endpoint governing N upstream servers (W2).
#
# Point a client that has no hook seam (Claude Desktop) or that runs many servers (Cursor) at a
# SINGLE kriya-gateway entry, and it governs every upstream through one policy → approval → budget →
# signed audit, all into one ~/.kriya/audit/broker.jsonl chain. Each upstream's tools are served
# namespaced as `<name>__<tool>`, so policy gates a whole server with `<name>__*`.
#
#   kriya-gateway broker --config broker.yaml
#
# Claude Desktop (claude_desktop_config.json → "mcpServers"):
#   { "mcpServers": { "kriya": {
#       "command": "/Applications/Kriya Console.app/Contents/MacOS/kriya-gateway",
#       "args": ["broker", "--config", "/absolute/path/to/broker.yaml"]
#   } } }

upstreams:
  # LOCAL (stdio) upstream: a stable `name` (its namespace) + the `command`/`args` to spawn.
  - name: notes
    command: node
    args: ["mock-mcp-server.js"]

  # Add as many as you run — one endpoint governs them all. e.g. a second stdio server:
  # - name: github
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-github"]

  # REMOTE (HTTP/SSE) upstream (W2-2): a hosted MCP server reached by `url` instead of a spawned
  # process — the servers a client adds directly (no local proc). Needs a gateway built with
  # `--features mcp-http` (the shipped Console bundle is). Optional `headers` add auth, etc.
  # - name: linear
  #   url: "https://mcp.linear.app/mcp"
  #   headers:
  #     Authorization: "Bearer ${LINEAR_TOKEN}"   # substitute the real token; no env expansion yet

# Optional governance knobs (same as `proxy`; CLI flags override these). With none set, the default
# is a per-namespace deny-by-default: read-shaped names allow, destructive/spend names require
# approval, everything else denies.
# policy: agent-policy.yaml
# approval: gui          # deny (default) | tty | gui (macOS) | auto
# signing-key: ~/.kriya/keys/broker.key   # a durable, pinnable identity across runs
# actor: claude-desktop
